id: laiv-mecklenburg-vorpommern
title: 3D Building Models LoD2 Mecklenburg-Vorpommern
description: |
  Digital 3D building models (LoD2) for the state of Mecklenburg-Vorpommern, Germany.
  The models are reduced to surface buildings and structures recorded in the land register
  (underground buildings are not included). In this LoD2 structural model, buildings are
  modeled with standardized roof shapes (e.g., gable or hipped roofs). The 3D building
  volumes carry the ALKIS UUID, allowing them to be linked to other specialist data via
  the ALKIS reference. The dataset contains approximately 1.3 million buildings.
