id: wcc-wellington-2017
title: Wellington 3D Buildings 2017
description: |
  3D Buildings in Wellington, New Zealand, covering the area from Kaiwharawhara
  in the north, to Melrose in the South, and extending from Kelburn to Rongotai.
  Captured 5th May 2017. The coverage area has been divided into 29 sub-areas.
  NOTE: The input links currently point to ArcGIS item pages containing ESRI Scene Layer Package (SLPK) format files.
license: CC-BY-4.0
keywords:
  - 3d city model
  - buildings
  - new zealand
  - wellington
  - slpk
