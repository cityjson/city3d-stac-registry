id: lgb-brandenburg
title: 3D Building Model Brandenburg
description: |
  Three-dimensional building models (LoD2) for the state of Brandenburg, Germany.
  Building footprints correspond exactly to the real estate cadastre. Heights
  and roof shapes are derived from automatic stereo aerial image analysis,
  LIDAR data, or manual modeling. The building ground height is set to the
  lowest point of the Digital Terrain Model (DTM) within the footprint.
license: dl-de/by-2-0
keywords:
  - 3d city model
  - germany
  - brandenburg
  - buildings
  - citygml
  - lod2
providers:
  - name: Landesvermessung und Geobasisinformation Brandenburg (LGB)
    url: https://geobasis-bb.de
    roles:
