id: zurich-3d
title: Zürich 3D City Model (LoD2)
description: |
  3D LoD2 city model of Zürich, Switzerland.
  Full city dataset with building models converted from CityGML to CityJSON.

  This is the only CityJSON version of Zürich's 3D building data available.
  Original data from the City of Zürich open data portal.
