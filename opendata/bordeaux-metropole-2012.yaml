id: bordeaux-metropole-2012
title: Textured 3D Model of Bordeaux Métropole
description: |
  Realistic 3D model of the Bordeaux Métropole territory based on an aerial acquisition in the summer of 2012.
  The dataset is an assembly of a Digital Terrain Model (DTM) draped with a 2012 orthophoto, combined with
  textured LoD2 3D building models provided in AutoDesk 3DS format.
  Building models were produced by SIRADEL, and draping was processed by Bordeaux Métropole.
  The dataset is cut into 1.4km x 1km tiles (sub-divided into 200m x 200m). Downloads are area-based
  via an interactive graphic downloader, requiring users to reference the 'to_dalle_s' grid.
license: etalab-2.0
keywords:
  - 3d city model
  - france
  - bordeaux
  - lod2
  - textured
  - 3ds
