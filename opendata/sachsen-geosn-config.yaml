id: geosn-sachsen
title: Digital 3D city model (LoD2) Freistaat Sachsen
description: |
  Digital 3D city model for the Free State of Saxony (Sachsen), Germany.
  The model includes both buildings and structures (e.g., bridges, wind turbines, masts, walls, weirs).
  Buildings are available in Level of Detail 1 (LoD1, flat roof) and Level of Detail 2 (LoD2, standardized roof shapes).
  Structures are currently modeled exclusively as LoD1 objects because standard roof shapes cannot typically be assigned to them.
  The models are automatically generated using building floor plans from the ATKIS database, combined with a Digital Terrain Model (DGM) and non-ground points from classified LiDAR point clouds.
  The dataset is updated annually based on ATKIS and new laser scan data. No manual detailed modeling or texturing is applied.
