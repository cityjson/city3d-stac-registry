id: craig-clermont-ferrand-2024
title: 3D building models Clermont-Ferrand 2024
description: |
  Digital 3D building models for part of the Clermont-Ferrand agglomeration, France.
  The dataset covers the municipalities of Cournon-d'Auvergne, Gerzat, and parts of Chamalières and Clermont-Ferrand.
  It contains approximately 45,000 buildings modeled in LoD 2.2 with textured roofs.
  Produced between 2024 and 2025 by ATGT using 5cm resolution nadir aerial photographs acquired in 2022.
license: etalab-2.0 # NOTE: Licence Ouverte v2.0
keywords:
  - 3d city model
  - france
  - clermont-ferrand
  - auvergne-rhone-alpes
  - buildings
  - citygml
  - cityjson
  - lod2
  - textured roofs
providers:
  - name: CRAIG (Centre Régional Auvergne-Rhône-Alpes de l'Information Géographique)
    url: https://ids.craig.fr/geocat/srv/eng/catalog.search#/home
    roles:
      - producer
      - host
      - licensor
    description: Regional geographic information center for Auvergne-Rhône-Alpes.
    # NOTE: Contact via contact@craig.fr
