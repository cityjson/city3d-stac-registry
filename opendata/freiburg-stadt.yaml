id: stadt-freiburg-2024
title: 3D Building Model LoD2 Freiburg
description: |
  Digital 3D building model (LoD2) for the city of Freiburg im Breisgau, Germany.
  Buildings are modeled with standardized roof shapes (e.g., gable, hip, mansard,
  flat) without roof structures or facade textures. Geometries are derived from
  official building footprints (ALKIS), aerial imagery (orthophotos, oblique
  images, cycloramas), and digital elevation models (DGM5, DOM).
