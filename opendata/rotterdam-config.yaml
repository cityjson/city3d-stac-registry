id: rotterdam-3d
title: Rotterdam 3D City Model (LoD2)
description: "3D LoD2 city model of Rotterdam, Netherlands, with textures.\nCreated from cadastre footprints combined with LiDAR data.\nThis sample dataset covers the Delfshaven district of Rotterdam.\nOriginal data available in CityGML format from the city open data portal.\n"
license: CC-BY-4.0
keywords:
- 3d city model
- buildings
- LOD2
- Netherlands
- Rotterdam
- CityGML
- textured
- LiDAR
- port city
- Delfshaven
