    url: https://www.schleswig-holstein.de/DE/landesregierung/ministerien-behoerden/LVERMGEOSH/lvermgeosh_node.html
    roles:
      - producer
      - licensor
      - host
    description: State Office for Surveying and Geoinformation Schleswig-Holstein
    #NOTE: Contact via Vertrieb.Geobasisdaten@LVermGeo.landsh.de.
