id: lvermgeo-schleswig-holstein
title: 3D building models LoD2 Schleswig-Holstein
description: |
  Digital 3D building models (Level of Detail 2) for the state of Schleswig-Holstein, Germany.
  Compared to LoD1, the LoD2 models additionally feature standardized roof shapes that correspond
  to the actual ridge lines. The heights of the buildings are generally derived from
  laser scanning data. The data is provided in CityGML format.
  The dataset allows for statewide mass extraction via a GeoJSON link list, as well as area-based downloads.
license: proprietary # NOTE: Despite being hosted on an "open geodata" portal, the metadata strictly states that reproduction or distribution violates copyright law and survey law. Verification of the actual terms of use on the portal is recommended.
keywords:
  - 3d city model
  - germany
  - schleswig-holstein
  - buildings
  - citygml
  - geojson
  - lod2
  - laserscanning
providers:
