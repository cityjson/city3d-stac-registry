id: melbourne-3d
title: Melbourne 3D Textured Mesh (Photomesh)
description: |
  3D textured mesh (photogrammetry) of Melbourne, Australia.
  Photomesh representing all physical features (buildings, trees, terrain) across City of Melbourne.
  Available in OBJ format with material (.mtl) and texture (.jpg) files, and SLPK format.

  2018 capture: OBJ format, tile-based download (7.5cm ground sample distance).
  2020 capture: OBJ and SLPK formats, 2cm ground sample distance.

  This is a photogrammetric 3D mesh, NOT a semantic CityJSON/CityGML city model.
  The data does not contain semantic building attributes or LoD classifications.
  Victoria state also provides Vicmap Buildings with 2D/3D representations statewide.
license: CC-BY-4.0
