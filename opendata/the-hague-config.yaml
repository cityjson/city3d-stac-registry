id: the-hague-3d
title: The Hague 3D City Model (LoD2 with Terrain)
description: "3D LoD2 city model of The Hague (Den Haag), Netherlands, including terrain.\nThis is a sample dataset from the 2018 city model.\nA 2010 model is also available which contains terrain intersection curves.\nOriginal data available in CityGML and DGN formats from the city open data portal.\n"
