id: lod3-railway-demo
title: LoD3 Railway Demo (CityGML Demo Dataset)
description: |
  CityGML demonstration dataset featuring multiple city object types in LoD3.
  Includes buildings, railway infrastructure, terrain, vegetation (with Geometry Templates),
  water bodies, and tunnels. This dataset showcases advanced CityGML features including
  Geometry Templates for repeated vegetation objects.

  Originally created as a CityGML demo, converted to CityJSON v2.0 by TU Delft.
license: CC-BY-4.0
keywords:
- 3d city model
- CityGML demo
- LOD3
- railway
- tunnels
- vegetation
- terrain
- water
- geometry templates
- multi-feature
