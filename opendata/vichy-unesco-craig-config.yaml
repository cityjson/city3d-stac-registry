id: craig-vichy-unesco-2024
title: 3D building models Vichy UNESCO perimeter 2024
description: |
  High-precision digital 3D building models strictly limited to the UNESCO World Heritage perimeter within the city of Vichy, France.
  Unlike broader city models, this dataset focuses on a specific historical zone, containing exactly 879 buildings.
  Because of its focus on heritage preservation, the models are highly detailed at LoD 3 with textured roofs.
  Produced in 2024 by ATGT using ultra-high resolution (3cm) nadir aerial photographs acquired in 2021.
