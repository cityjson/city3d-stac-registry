id: opendata-melbourne-2020
title: City of Melbourne 3D Textured Mesh (Photomesh) 2020
description: |
  3D textured mesh (photomesh) representing all physical features including buildings, trees,
  and terrain across the City of Melbourne. The data was captured in May 2020 with a 2cm
  ground sample distance.
  The dataset is provided as a series of tiles covering the entire municipality.
  NOTE: The inputs below are direct links to the ESRI Scene Layer Package (SLPK) format.
license: CC-BY-4.0
keywords:
  - 3d city model
  - australia
  - melbourne
  - photomesh
  - mesh
  - slpk
  - obj
  - terrain
  - vegetation
providers:
  - name: City of Melbourne (Technology Innovation and Data)
    url: https://data.melbourne.vic.gov.au
    roles:
      - producer
      - host
      - licensor
    description: Official Open Data Portal for the City of Melbourne
inputs:
  - https://gis-3dmodelcapture-2020.s3.ap-southeast-2.amazonaws.com/photomesh/SLPK/WGS84/Flemington_WGS84.slpk # NOTE: Flemington tile
  - https://gis-3dmodelcapture-2020.s3.ap-southeast-2.amazonaws.com/photomesh/SLPK/WGS84/Bolte_WGS84.slpk # NOTE: Bolte tile
  - https://gis-3dmodelcapture-2020.s3.ap-southeast-2.amazonaws.com/photomesh/SLPK/WGS84/Westgate_WGS84.slpk # NOTE: Westgate tile
  - https://gis-3dmodelcapture-2020.s3.ap-southeast-2.amazonaws.com/photomesh/SLPK/WGS84/Royal_Park_WGS84.slpk # NOTE: Royal_Park tile
  - https://gis-3dmodelcapture-2020.s3.ap-southeast-2.amazonaws.com/photomesh/SLPK/WGS84/Melb_Uni_WGS84.slpk # NOTE: Melb_Uni tile
  - https://gis-3dmodelcapture-2020.s3.ap-southeast-2.amazonaws.com/photomesh/SLPK/WGS84/CBD_WGS84.slpk # NOTE: CBD tile
  - https://gis-3dmodelcapture-2020.s3.ap-southeast-2.amazonaws.com/photomesh/SLPK/WGS84/Southbank_WGS84.slpk # NOTE: Southbank tile
  - https://gis-3dmodelcapture-2020.s3.ap-southeast-2.amazonaws.com/photomesh/SLPK/WGS84/Hoddle_WGS84.slpk # NOTE: Hoddle tile
extent:
  spatial:
    bbox: []
    crs: EPSG:4326
