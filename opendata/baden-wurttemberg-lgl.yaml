id: lgl-baden-wurttemberg-2024
title: 3D Building model (LoD2) Baden-Württemberg
description: |
  Digital 3D building models (LoD2) for the state of Baden-Württemberg, Germany.
  The models are automatically generated in CityGML format by deriving roof shapes
  from a combination of foundational datasets: ALKIS building floor plans, Digital
  Terrain Models (DGM), 3D point clouds from Airborne Laser Scanning (ALS) acquired
  between 2000 and 2018, and 3D point clouds derived from high-resolution (10 cm)
  digital stereoscopic aerial images collected since 2011.
license: dl-de/by-2-0
keywords:
  - 3d city model
  - germany
  - baden-württemberg
  - buildings
  - citygml
  - lod2
