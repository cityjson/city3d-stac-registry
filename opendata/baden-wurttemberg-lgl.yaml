      - licensor
    description: State Office for Geoinformation and Land Development
    # NOTE: Contact via geodaten@lgl.bwl.de (+49 711 95980-200)
inputs:
  - https://opengeodata.lgl-bw.de/#/(sidenav:product/lod2) # NOTE: Manual download via map interface is required (max 10 tiles at a time).
extent:
  spatial:
    bbox: [7.20, 47.40, 10.70, 50.00]
    crs: EPSG:25832
  temporal:
    start: "2000-01-01T00:00:00Z"
    end: "2018-12-31T00:00:00Z" # NOTE: Extracted from the ALS data acquisition period (between 2000 and 2018).
