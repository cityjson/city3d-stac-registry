id: craig-isere-2025
title: 3D building models Isère 2025
description: |
  Digital 3D building models for 14 EPCIs (municipalities) in the Isère department, France.
  The dataset contains approximately 30,000 buildings modeled in LoD 2.2 and LoD 3.
  A unique feature of this dataset is that the building roofs are textured with a color gradient
  representing the calculated solar irradiation for the year 2023, taking into account roof
  characteristics and shadows from surrounding terrain and vegetation.
  Produced by ATGT from 5cm resolution nadir aerial photographs acquired between 2019 and 2024.
license: etalab-2.0 # NOTE: Licence Ouverte 2.0 (Open License version 2.0) is the standard French open data license.
