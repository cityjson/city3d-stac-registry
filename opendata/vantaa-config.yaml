
# Vantaa 3D City Model - Part of Helsinki Metropolitan Area
# Data access through city portal or Helsinki Region Infoshare
# NOTE: License needs verification - may not actually be CC-BY-4.0
id: vantaa-3d
title: Vantaa 3D City Model (LoD1+LoD2)
description: |
  3D city model of Vantaa, Finland, available at both LoD1 and LoD2.
  Vantaa is part of the Helsinki metropolitan area and participates in
  regional 3D city modeling initiatives.

  Available Formats:
  - CityGML (semantic 3D model)
  - SketchUp (SKP)
  - KML (Google Earth)

  Features:
  - Textured buildings
  - Multiple Levels of Detail (LoD1 and LoD2)
  - Part of Helsinki metropolitan area digital twin initiative

  Data Access:
  - Available through City of Vantaa geographic information services
  - May also be accessible via Helsinki Region Infoshare (hri.fi)

  Technical Details:
  - Format: CityGML 2.0, SketchUp, KML
  - CRS: EPSG:3067 (ETRS-TM35FIN)
license: CC-BY-4.0
keywords:
- 3d city model
- buildings
- LOD1
- LOD2
- Finland
- Vantaa
- CityGML
- textured
- multi-LOD
- Helsinki metropolitan area
