id: singapore-hdb-3d
title: Singapore Public Housing (HDB) 3D Buildings
description: "3D LoD1 models of Singapore's public housing buildings (HDB - Housing & Development Board).
The dataset contains approximately 12,000 government-subsidized public housing apartments
with rich semantic attributes from OpenStreetMap and HDB property information.
Generated by extruding OSM footprints using height estimated from HDB storey data.
Code used to generate the dataset is publicly available.
Available in CityJSON and OBJ formats.
"
