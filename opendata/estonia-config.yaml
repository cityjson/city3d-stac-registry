id: estonia-3d
title: Estonia 3D Building Models (LoD1+LoD2)
description: "National 3D building dataset covering all of Estonia at LoD1 and LoD2.
  Data is produced from cadastral footprints and LiDAR. Available in Geodatabase,
  CityGML, and OBJ formats. Updated frequently with new municipalities added regularly.
  Free for commercial and non-commercial use with attribution.\n"
license: CC-BY-4.0
keywords:
- 3d city model
- buildings
- LOD1
- LOD2
- Estonia
- national
- CityGML
- frequently updated
- LiDAR
