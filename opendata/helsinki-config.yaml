# Helsinki 3D City Model - Data available via WFS API and direct download
# WFS endpoint: https://kartta.hel.fi/3d/citydb-wfs/wfs
# CityGML downloads: http://3d.hel.ninja/data/citygml/
id: helsinki-3d
title: Helsinki 3D City Model (LoD2)
description: |
  3D LoD2 city model of Helsinki, Finland, with textures.
  Available in multiple formats: CityGML, 2D Shape, 3D Shape (PolygonZ),
  3D Shape (Multipatch), KMZ, DXF, DWG, 3DS, and ESRI File Geodatabase.

  Data Access:
  - WFS API: https://kartta.hel.fi/3d/citydb-wfs/wfs (OGC WFS 2.0.0)
  - CityGML Downloads: http://3d.hel.ninja/data/citygml/
  - Interactive Viewer: https://kartta.hel.fi/3d/

  Technical Details:
  - Data Model: CityGML 2.0 with 3DCityDB schema
  - CRS: ETRS-GK25 (EPSG:3879) plane coordinates, N2000 height system
  - Database: PostgreSQL/PostGIS with 3DCityDB
license: CC-BY-4.0
