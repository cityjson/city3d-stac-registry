id: lyon-3d
title: Lyon 3D City Model (LoD2)
description: "Comprehensive 3D building basemap of the Metropolis of Lyon.\nThe data is managed in 3D and covers the entire territory, structured into 5 semantic layers.\n1. Roof volumes (captured at gutter level)\n2. 3D ridge lines (roof edges)\n3. Ridge vertices (highest points)\n4. Superstructures (roof-on-roof features)\n5. Buildings under construction.\n"  # NOTE: Data is provided as separate structural layers.
license: ETALAB-2.0
keywords:
- 3d city model
- buildings
- LOD2
- France
- Lyon
- CityGML
- textured
- terrain
- water
- multi-temporal
- Grand Lyon
providers:
- name: Métropole de Lyon
  url: https://www.grandlyon.com/
  roles:
  - producer
  - licensor
  description: Lyon metropolitan government (Grand Lyon), the public authority responsible for the 3D city model production and licensing
inputs:
  - https://data.grandlyon.com/geoserver/metropole-de-lyon/ows?SERVICE=WFS&VERSION=2.0.0&request=GetFeature&typename=metropole-de-lyon:fpc_fond_plan_communaut.fpctoit&outputFormat=GML3&SRSNAME=EPSG:4171&sortBy=gid # Note: Data for 1. Roof volumes (captured at gutter level)
  # - https://data.grandlyon.com/geoserver/metropole-de-lyon/ows?SERVICE=WFS&VERSION=2.0.0&request=GetFeature&typename=metropole-de-lyon:fpc_fond_plan_communaut.fpclignefaitage&outputFormat=GML3&SRSNAME=EPSG:4171&sortBy=gid # Note: Data for 2. 3D ridege lines (roof edges)
  # - https://data.grandlyon.com/geoserver/metropole-de-lyon/ows?SERVICE=WFS&VERSION=2.0.0&request=GetFeature&typename=metropole-de-lyon:fpc_fond_plan_communaut.fpcsommetfaitage&outputFormat=GML3&SRSNAME=EPSG:4171&sortBy=gid # Note: Data for 3. Ridge vertices (highest points)
