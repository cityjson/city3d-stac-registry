id: lyon-3d
title: Lyon 3D City Model (LoD2)
description: |
  Comprehensive 3D building basemap of the Metropolis of Lyon, France.
  The data is managed in 3D and covers the entire territory, structured into 5 semantic layers:
  1. Roof volumes (captured at gutter level)
  2. 3D ridge lines (roof edges)
  3. Ridge vertices (highest points)
  4. Superstructures (roof-on-roof features)
  5. Buildings under construction

  Data is available through the Grand Lyon open data portal as WFS services
  and downloadable textured 3D models (CityGML) by commune/arrondissement.
