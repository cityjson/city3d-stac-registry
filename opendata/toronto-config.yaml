id: toronto-3d
title: Toronto 3D City Model (LoD1)
description: |
  3D LoD1 city model of Toronto, Canada.
  Building footprints with height information for virtually every building in the City of Toronto.
  The "3D Massing" dataset is maintained by City Planning Division and refreshed annually.

  Note: The portal UI shows a "Retired" label, but the CKAN API returns is_retired: false
  and the data files (2025 vintage) are actively hosted and accessible (verified 2026-03-25).

  Data format: ESRI Shapefile (3D with EleZ height) and ESRI Multipatch Geodatabase.
  No CityJSON or CityGML format available.
