id: zwolle-3d
title: Zwolle 3D City Model (via Netherlands 3D BAG)
description: |
  3D city model of Zwolle, Netherlands.
  Zwolle is covered by the Netherlands 3D BAG (3D Basisregistratie Adressen en Gebouwen),
  the national 3D building dataset containing all 10+ million buildings in the Netherlands.

  The 3D BAG provides LoD1.2, LoD1.3, and LoD2.2 models and is maintained by
  3D Geoinformation Group at TU Delft and 3DGI.

  Zwolle area contains approximately 145,000 buildings (BAG municipality code: 0193).
  Data is available in CityJSON format via the 3DBAG API:
    https://api.3dbag.nl/collections/pand/items?bbox=196000,499000,206000,508000

  Note: The full Netherlands 3D BAG dataset is catalogued separately in
  netherlands-3d-bag-config.yaml. This config is for the Zwolle-specific subset.
