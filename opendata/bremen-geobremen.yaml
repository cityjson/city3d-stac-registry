id: geobremen-bremen
title: 3D Building Model LoD2 Land Bremen
description: |
  Digital 3D building model (LoD2) for the state of Bremen, Germany.
  The block models feature standardized roof shapes and are generated based
  on data from the official real estate cadastre (ALKIS), the Digital
  Terrain Model (DGM), and Digital Orthophotos (DOP).
license: CC-BY-4.0
keywords:
  - 3d city model
  - germany
  - bremen
  - buildings
  - citygml
  - lod2
providers:
  - name: Landesamt GeoInformation Bremen
    url: https://www.geo.bremen.de/
    roles:
      - producer
      - licensor
    description: State Office for GeoInformation Bremen
    # NOTE: Contact via geodatenservice@geo.bremen.de
inputs:
  - https://gdi2.geo.bremen.de/inspire/download/LoD/data/LOD2_CITYGML_HB.zip # NOTE: Contains the 3D buildings for the inland City of Bremen (HB).
  - https://gdi2.geo.bremen.de/inspire/download/LoD/data/LOD2_CITYGML_BHV.zip # NOTE: Contains the 3D buildings for the coastal City of Bremerhaven (BHV).
extent:
  spatial:
    bbox: [8.477, 53.010, 8.991, 53.611] # [west, south, east, north]
    crs: EPSG:25832
  temporal:
    start: ""
    end: "2025-04-28T00:00:00Z" # NOTE: Extracted from 'Timeliness of the data' (Aktualität der Daten) information on MetaVer Website (3rd link in Links)
