id: craig-chatel-guyon-riom-2024
title: 3D building models Châtel-Guyon & Riom 2024
description: |
  Digital 3D building models for the municipalities of Châtel-Guyon and Riom, France.
  The dataset contains approximately 15,000 buildings modeled in LoD 2.2 with textured roofs.
  Produced in 2024 by ATGT using 5cm resolution nadir aerial photographs acquired in 2018 for the PCRS.
  The precision is under 10 cm in planimetry (XY) and under 20 cm in altimetry (Z).
