id: american-cities-3d
title: American Cities 3D Buildings
description: "125 million buildings across the United States at LoD1.\nGenerated from Microsoft USBuildingFootprints, OpenStreetMap, and other open sources.\nSeparated by state. Available in both CityJSON and CityGML formats.\n"
license: ODbL-1.0
keywords:
- 3d city model
- buildings
- LOD1
- United States
- national
- CityJSON
- CityGML
- 125M buildings
providers:
- name: BuildZero.Org
  url: https://github.com/opencitymodel/opencitymodel
  roles:
  - producer
  - licensor
  description: Non-profit 501(c)3 that created the OpenCityModel data pipeline combining Microsoft USBuildingFootprints, OpenStreetMap, and other open datasets (original website buildzero.org is defunct)
- name: Microsoft
  url: https://github.com/microsoft/USBuildingFootprints
  roles:
  - producer
  description: Original source of ~125M building footprints via Microsoft USBuildingFootprints (derived from Bing Maps imagery using deep learning)
- name: OpenStreetMap Contributors
  url: https://www.openstreetmap.org/
  roles:
  - producer
  description: Additional building footprints and height data sourced from OpenStreetMap

# Input Data
# ------------------------------------------------------------------
# 5,229 files across 51 US states (125M buildings total)
# All URLs are stored in: opendata/data/american-cities-urls.txt
#
# The data is organized by state and FIPS code:
# s3://opencitymodel/2019-jun/json/{State}/{FIPS}/{state}-{fips}-{index}.json
#
# Sample URLs (first 5 files):
#   - Alabama/01001/Alabama-01001-000.json
#   - Alabama/01003/Alabama-01003-000.json
#   - Alabama/01003/Alabama-01003-001.json
#   - Alabama/01003/Alabama-01003-002.json
#   - Alabama/01005/Alabama-01005-000.json
#
# States with most files:
#   - Texas: 424 files
#   - California: 342 files
#   - Florida: 215 files
#   - Georgia: 206 files
#   - New York: 170 files
#   - North Carolina: 170 files
#   - Ohio: 178 files
#
# To process: Load all URLs from opendata/data/american-cities-urls.txt
# or construct URLs programmatically using the S3 pattern above.
inputs:
  from_file: data/american-cities-urls.txt
extent:
  spatial:
    bbox: []
    crs: EPSG:4326
  temporal:
    start: '2019-01-01T00:00:00Z'
    end: '2019-12-31T23:59:59Z'
links:
