id: craig-aura-eleven-sectors-2021
title: 3D building models - Eleven Sectors of Auvergne-Rhône-Alpes 2021 (Experimental)
description: |
  Experimental digital 3D building models for 11 specific sectors across the Auvergne-Rhône-Alpes region, France.
  IMPORTANT: This dataset does NOT cover the entirety of the cities. It is a targeted, experimental project evaluating the use of 3D data by modeling specific landmarks and zones.
  The dataset contains approximately 5,000 buildings modeled in LoD 2.2 or LoD 3 with textured facades and roofs.
  Produced in 2021 by Avineon. A unique feature of this dataset is the use of oblique aerial photographs (3-5 cm resolution) for the Vichy and Saint-Étienne sectors to improve facade texturing, while other sectors use standard nadir imagery (5 cm) acquired between 2016 and 2020.
  Modeled sectors include:
  - Domérat (Châteaugay business park (ZAC))
  - Moulins (Place d'Allier and Régemortes bridge)
  - Vichy (Thermal baths district)
  - Riom (Tobacco factory)
  - Clermont-Ferrand (Marcel Michelin stadium
  - Cézeaux campus, and Cournon petroleum depot)
  - Aurillac (Lescudilliers industrial zone (ZI))
  - Saint-Étienne (Badouillière-Chavanelle district)
  - Voiron (City hall district)
  - Sainte-Colombe (City center)
  - Bourgoin-Jallieu (L'Oiselet high school)
  - Montluçon-Domérat (Photovoltaic power station at the airfield (untextured))
