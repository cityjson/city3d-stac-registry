# Espoo 3D City Model - Data available via WFS service through Espoo download portal
# Note: Data access may require registration or have usage restrictions
id: espoo-3d
title: Espoo 3D City Model (LoD1-LoD3)
description: |
  3D city model of Espoo, Finland, at multiple Levels of Detail (LoD1 to LoD3).
  The city information model covers all object types defined in the CityGML standard,
  except for engineering structures (bridges and tunnels).

  CityGML Classes Included:
  - Buildings (textured)
  - Water bodies
  - Terrain/Relief
  - Land use
  - Vegetation
  - Transportation

  Data Access:
  - WFS Service: Available through Espoo city download portal
  - CityGML: Available through Espoo city download portal
  - Note: Data access may require registration with the city

  Technical Details:
  - Format: CityGML 2.0
  - CRS: EPSG:3067 (ETRS-TM35FIN)
license: CC-BY-4.0
