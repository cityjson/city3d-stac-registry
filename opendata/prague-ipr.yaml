    url: https://geoportalpraha.cz
    roles:
      - producer
      - licensor
    description: Prague Institute of Planning and Development
extent:
  spatial:
    bbox: [14.201491, 49.918791, 14.735087, 50.193123] # [west, south, east, north]
    crs: EPSG:5514
  temporal:
    start: "2015-03-31T00:00:00Z" # NOTE: Extracted from data creation date described on website (1st link in 'Links')
    end: "2020-07-17T00:00:00Z" # NOTE: Extracted from data update date described on website (1st link in 'Links')
inputs: [] # NOTE: Area-based download via geoportal. See links for the portal.
