id: ipr-prague-2020
title: 3D Building Model of Prague
description: |
  Photogrammetrically processed 3D building model for Prague, Czech Republic.
  The dataset is divided into 1:5000 map sheets and is available in multiple
  formats including CityGML, 3D Shapefile, and Multipatch.
license: CC-BY-4.0
keywords:
  - 3d city model
  - czech republic
  - prague
  - buildings
  - citygml
providers:
