id: opendata-toronto
title: 3D Massing Toronto
description: |
  3D Massing dataset providing spatial representations of building footprints and heights for the City of Toronto.
  The dataset provides both standard 3D Massing (extruded polygons) and Esri Multipatch formats.
  Attribute data includes MSL height (HEIGHT_MSL) calculated using average height and a surface elevation base.
license: proprietary # NOTE: Open Government Licence - Toronto. Exact SPDX identifier not specified.
keywords:
