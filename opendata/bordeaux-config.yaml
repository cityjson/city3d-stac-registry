id: bordeaux-3d
title: Bordeaux 3D City Model (LoD2)
description: |
  3D LoD2 city model of Bordeaux Metropole, France.
  Photorealistic 3D model of the Bordeaux metropolitan area from summer 2012.
  Buildings are modelled at LOD2 (CityGML standard) with textures from aerial photography.
  The model is divided into downloadable tiles of 1.4 km x 1 km, subdivided into 200m x 200m sub-tiles.
  An untextured ("maquette blanche") version is also available as dataset bati3d_nt.

  Data format: AutoDesk 3DS (.3ds) - tile-based download through the Bordeaux Metropole open data portal.
  No CityJSON or CityGML files are directly available.
