id: craig-aura-zae-2024
title: 3D building models - Economic Activity Zones (ZAE) Auvergne-Rhône-Alpes 2024
description: |
  Digital 3D building models strictly limited to the Economic Activity Zones (ZAE - Zones d'activités économiques) across 9 municipalities (EPCI) in the Auvergne-Rhône-Alpes region, France.
  IMPORTANT: This dataset does NOT cover the entirety of these cities or municipalities. It exclusively models specific industrial, commercial, and business parks within those territories.
  The dataset contains approximately 24,000 buildings modeled in high detail at LoD 3 with textured roofs.
  Produced between 2024 and 2025 by ATGT using 3 to 5 cm resolution nadir aerial photographs acquired between 2016 and 2022.
