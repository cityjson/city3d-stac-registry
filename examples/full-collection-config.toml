# Comprehensive TOML configuration file for STAC collection metadata
# This file demonstrates ALL possible configuration options.
# Usage: city3dstac collection --config examples/full-collection-config.toml -o ./stac_output

# ------------------------------------------------------------------
# Core Metadata
# ------------------------------------------------------------------

# Collection identifier (defaults to directory name if omitted)
id = "comprehensive-collection-id"

# Collection title
title = "Comprehensive 3D City Collection"

# Collection description (supports multiline strings)
description = """
A comprehensive example of a 3D city model collection.
This dataset includes various Levels of Detail (LODs) and semantic surfaces.
"""

# Data license (SPDX identifier or proprietary)
license = "CC-BY-4.0"

# Keywords/tags to categorize the collection
keywords = [
  "3d city model",
  "digital twin",
  "buildings",
  "vegetation",
  "transportation",
  "LOD2",
]

# ------------------------------------------------------------------
# Input Data
# ------------------------------------------------------------------

# Input paths (files, directories, or glob patterns)
# If CLI arguments are provided, they take precedence over these.
inputs = [
  "tests/data/delft.city.json",
  "tests/data/railway.city.json",
  # "data/*.json",
  # "data/district1/",
  # "/absolute/path/to/data"
]

# ------------------------------------------------------------------
# Providers
# ------------------------------------------------------------------

# List of organizations/individuals involved in the data
[[providers]]
name = "City Data Office"
url = "https://data.city.example.com"
roles = ["producer", "licensor"]
description = " The official data provider for the city."

[[providers]]
name = "University Geo Lab"
url = "https://geolab.university.example.edu"
roles = ["processor", "host"]
description = "Processed and hosts the data for public access."

# ------------------------------------------------------------------
# Spatial and Temporal Extent
# ------------------------------------------------------------------

# Custom extent information (overrides auto-detected values from data)
[extent]

# Spatial extent
[extent.spatial]
# Bounding box: [minx, miny, minz, maxx, maxy, maxz] or [minx, miny, maxx, maxy]
# EPSG:7415 uses [X, Y, Z]
bbox = [4.3, 51.8, -10.0, 4.8, 52.2, 200.0]
# Coordinate Reference System (e.g., "EPSG:7415")
crs = "EPSG:7415"

# Temporal extent
[extent.temporal]
start = "2023-01-01T00:00:00Z" # RFC3339 format
end = "2023-12-31T23:59:59Z"   # Use null (omit) for open-ended intervals

# ------------------------------------------------------------------
# Custom Summaries
# ------------------------------------------------------------------

# Custom fields to add to the aggregation summaries
# These are merged with automatically generated summaries (like city3d:lods)
[summaries]
"constellation" = "Sentinel-2"
"platform" = "satellite"
"instruments" = ["msi"]
"gsd" = 0.5
"eo:cloud_cover" = 10.5
"my:custom_metric" = { "average" = 42, "unit" = "m" }

# ------------------------------------------------------------------
# Additional Links
# ------------------------------------------------------------------

# Extra links to include in the collection JSON
[[links]]
rel = "license"
href = "https://creativecommons.org/licenses/by/4.0/"
type = "text/html"
title = "CC-BY-4.0 License"

[[links]]
rel = "about"
href = "https://city.example.com/project-page"
type = "text/html"
title = "Project Homepage"

[[links]]
rel = "derived_from"
href = "https://source-data.example.com/raw"
type = "application/json"
title = "Source Data"
