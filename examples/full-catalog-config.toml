# Comprehensive TOML configuration file for STAC catalog metadata
# This file demonstrates ALL possible configuration options.
# Usage: city3dstac catalog --config examples/full-catalog-config.toml -o ./catalog_output

# ------------------------------------------------------------------
# Core Metadata
# ------------------------------------------------------------------

# Catalog identifier (defaults to output directory name if omitted)
id = "comprehensive-catalog-id"

# Catalog title
title = "Comprehensive 3D City Catalog"

# Catalog description (supports multiline strings)
description = """
A comprehensive example of a hierarchical 3D city catalog.
This catalog aggregates multiple sub-collections into a unified structure.
"""

# ------------------------------------------------------------------
# Collections
# ------------------------------------------------------------------

# List of directories to include as sub-collections.
# Each directory will be processed recursively to generate a STAC Collection within this Catalog.
collections = [
  "../tests/data",
  # "data/rotterdam",
  # "data/amsterdam",

  # Example of including a remote collection via a config file:
  "remote-collection-config.toml",
]

# Note: Currently, specialized metadata like providers, extent, and links
# are mainly configured at the collection level (via collection-config.toml
# or CLI args when generating individual collections).
# The catalog configuration focuses on identifying and describing the root catalog itself.
