# Example YAML configuration file for STAC collection metadata
# Usage: city3dstac collection --config examples/collection-config.yaml -o ./stac_output
# Or override inputs via CLI: city3dstac collection data/*.json --config examples/collection-config.yaml -o ./stac_output
# Note: This config format is also supported for defining collections within a catalog configuration.

# Input paths (files, directories, or glob patterns)
# These are used if no inputs are provided via CLI
inputs:
  - "tests/data/delft.city.json"
  - "tests/data/railway.city.json"
  # You can also use glob patterns:
  # - "data/*.city.json"
  # - "data/**/*.json"
  # - "/path/to/dataset"

# Collection identifier (optional - defaults to directory name)
id: 3dbag

# Collection title (optional)
title: 3DBAG

# Collection description (optional - supports multiline)
description: |
  Complete 3D city model of the Netherlands containing buildings.

# Data license (SPDX identifier)
# See https://spdx.org/licenses/ for common identifiers
license: CC-BY-4.0

# Keywords/tags for the collection (optional)
keywords:
  - 3d city model
  - Netherlands

# Providers - organizations that produced or manage the data (optional)
providers:
  - name: 3DBAG
    url: https://3dbag.nl
    roles:
      - producer
      - licensor
    description: 3DBAG

  - name: TU Delft
    url: https://3d.bk.tudelft.nl
    roles:
      - processor
      - host
    description: TU Delft 3D geoinformation group

