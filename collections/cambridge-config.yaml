id: cambridge-3d
title: Cambridge MA 3D City Model (LoD2)
description: |
  3D city model of Cambridge, Massachusetts, USA.
  High-quality LoD2 building models with detailed roof structures captured via
  aerial photogrammetry (CyberCity 3D), with ~10cm precision.
  Roof details larger than 1 meter are captured.

  Note: This is Cambridge, Massachusetts (USA), NOT Cambridge, United Kingdom.
  Cambridge UK does not have an openly available 3D city model.

  Available formats:
  - Esri GDB Multipatch (citywide, direct download)
  - Scene Layer Package (ArcGIS Online)
  - SketchUp SKP (tiled, via interactive map)
  - Wavefront OBJ (tiled, via interactive map)
  - DXF ground plans (tiled, via interactive map)

  Cambridge MA buildings are also available in CityJSON/CityGML format via the
  Open City Model project (Middlesex County, FIPS 25017), but at LoD1 only.
license: other
