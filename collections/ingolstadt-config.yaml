id: ingolstadt-3d
title: Ingolstadt 3D City Model (LoD3)
description: "High-quality 3D LoD3 city model of Ingolstadt, Germany, created by a TU Delft research project.\nBuildings are manually modeled based on Mobile Laser Scanning (MLS) data.\nMainly focuses on buildings with textures. Includes a LoD3 Modeling Guide.\nAvailable in CityGML and CityJSON formats.\nNote: This is a research dataset, not official city data.\n"
license: CC-BY-4.0
