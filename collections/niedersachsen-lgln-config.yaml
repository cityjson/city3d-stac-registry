id: lgln-niedersachsen
title: 3D Building Models LoD2 Niedersachsen
description: |
  Digital 3D building models (LoD1 and LoD2) for the state of Niedersachsen (Lower Saxony), Germany.
  The models are derived from ALKIS building footprints, a 5m resolution Digital Terrain Model (DGM),
  and 3D measurement data (laser scanning or matching point clouds). The statewide production of LoD2
  was completed in 2019 and is continuously updated. LoD2 models feature standardized roof shapes
  with a height accuracy of approximately +/- 1m. The dataset includes extensive attributes defined
  by the AdV standard, plus additional custom attributes provided by LGLN such as roof inclination,
  roof orientation, and calculated roof area.
