id: helsinki-3d
title: Helsinki 3D City Model (LoD1/LoD2)
description: |
  3D city model of Helsinki, Finland, covering the entire municipality including
  outer islands. Available in CityGML 2.0 format with two levels of detail:
  LoD1 (flat roofs) and LoD2 (detailed roof shapes, textured and non-textured).

  The urban data model is divided into map sheets of four square kilometres each.
  Data access is through an interactive web viewer where users can select a
  specific extent to download.

  Technical Details:
  - Data Model: CityGML 2.0
  - CRS: ETRS-GK25 (EPSG:3879) + N2000 height system
  - City Object Types: Buildings, Terrain
  - Database: PostgreSQL/PostGIS with 3DCityDB
license: CC-BY-4.0
