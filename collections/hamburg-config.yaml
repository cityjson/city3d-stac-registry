id: hamburg-3d
title: Hamburg 3D City Model (LoD1 and LoD2)
description: "3D city model of Hamburg, Germany, available at both LoD1 and LoD2.\nCreated from cadastre footprints combined with LiDAR data.\nCovers the entire city area (~750 km²) with approximately 500,000 buildings.\nAvailable in CityGML format from the Hamburg Transparency Portal.\n"
