id: potsdam-3d
title: Potsdam 3D City Model (LoD2)
description: |
  3D LoD2 city model of Potsdam, Germany.
  Available in CityGML format. The data is also available as GeoJSON export
  via the Potsdam Open Data portal (Opendatasoft platform).
  Original data produced from laser scanning (2011) for the 2012 dataset.
license: dl-de/by-2-0
