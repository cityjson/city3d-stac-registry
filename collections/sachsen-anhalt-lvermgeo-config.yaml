id: lvermgeo-sachsen-anhalt
title: Digital 3D building models LoD2 Sachsen-Anhalt
description: |
  Digital 3D building models (LoD1 and LoD2) for the state of Sachsen-Anhalt, Germany.
  The models represent buildings and selected structures (e.g., towers, industrial facilities, sports facilities, historic buildings, and locks) derived from ALKIS and ATKIS databases.
  Underground buildings are explicitly excluded.
  LoD1 models are represented as block models with flat roofs, featuring a height accuracy of approximately 5 meters.
  LoD2 models feature standardized roof shapes aligned with actual ridge lines, providing a height accuracy of approximately 1 meter.
