id: wellington-3d
title: Wellington NZ 3D City Buildings (2022)
description: |
  3D building models of Wellington, New Zealand (2022 capture).
  Modelled from high resolution aerial imagery (7.5cm GSD) captured between
  29/01/2022 and 03/03/2022 using a Vexcel Osprey Mark 4 camera system.
  LoD3 detail with textured facades from oblique imagery.
  Accuracy: Horizontal RMS 0.25m, Vertical RMS 0.30m.

  Coverage: Entire Wellington City urban area, divided into 44 sub-areas.
  Each sub-area is a ZIP archive containing GDB, DWG, and SKP files.

  Data format: GDB (File Geodatabase), DWG (AutoCAD), SKP (SketchUp).
  No CityJSON or CityGML files available.

  An older 2017 dataset (SLPK format) is also available via data.govt.nz.
license: CC-BY-4.0
keywords:
- 3d city model
- buildings
- LOD3
- New Zealand
- Wellington
- GDB
- DWG
- SketchUp
- photogrammetry
- textured
