id: namur-3d
title: Namur 3D City Model (LoD2)
description: "3D LoD2 city model of Namur, Belgium (capital of Wallonia), with textures.\nIncludes special features: bridges (ponts) and the historic citadel (citadelle).\nAvailable in SketchUp (.skp) format from the Namur open data portal.\nNote: SketchUp format is not directly supported by cityjson-stac CLI.\n"
