id: bvv-bavaria
title: 3D Building Model (LoD2) Bayern
description: |
  Complete 3D building models (LoD2) for the state of Bavaria, Germany.
  Models feature ALKIS-compliant standard roof shapes and descriptive attributes.
  Geometries are derived from ALKIS building footprints, airborne laser scanning,
  and aerial digital surface models.
license: CC-BY-4.0
