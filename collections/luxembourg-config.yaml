id: luxembourg-3d
title: Luxembourg 3D Building Models (LoD2.3 Pilot)
description: |
  3D LoD2.3 building models from Luxembourg pilot project (2017).
  Buildings are modeled based on photogrammetric exploitation of 2017 aerial images.
  LoD2.3 includes detailed roof shapes (without dormers, chimneys, antennas, solar panels)
  with vertical projection to ground.

  Coverage: 3 km² total (2 km² in Diekirch, 1 km² in Bastendorf).
  This is a pilot project - not nationwide coverage.
  Available in CityGML format.
license: CC0-1.0
