id: georiga-riga-2022
title: LOD2 model of structures - GEO RĪGA
description: |
  Digital 3D building models (LoD2) for the city of Riga, Latvia. The models represent
  the spatial extent and contour of the objects, including simplified roof shapes.
  Data for the historical center and 13 built-up protection territories is based on
  2022 aerial laser scanning commissioned by the Riga municipality. Data for other
  territories is based on 2021 aerial laser scanning from the Latvian Geospatial
  Information Agency.
license: CC-BY-4.0
keywords:
