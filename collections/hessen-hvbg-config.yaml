    url: https://hvbg.hessen.de
    roles:
      - producer
      - licensor
    description: State Office for Land Management and Geoinformation Hessen
    # NOTE: Contact via vertrieb-geobasisdaten@hvbg.hessen.de
inputs: [] # NOTE: Direct download URLs are dynamic and expire daily. See links for the portal.
extent:
  spatial:
    bbox: [7.77, 49.39, 10.24, 51.66] # [west, south, east, north] Hessen state boundaries
    crs: EPSG:25832
  temporal:
    start: "2007-01-01T00:00:00Z" # NOTE: Airborne Laser Scanning (ALS) baseline acquisition started in 2007.
    end: "2024-12-31T00:00:00Z" # NOTE: ALKIS update cycle and supplementary data mention 2024.
