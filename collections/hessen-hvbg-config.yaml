# Additional Notes:
# - Format: CityGML 1.0
# - Coordinate Reference System: ETRS89/UTM (Zone 32) (EPSG:25832) with height reference DHHN2016 (m ü. NHN)
# - Update Frequency: Annual updates planned according to AdV product standards.
# - Accuracy: LoD2 height accuracy is generally +/- 1m[cite: 21], though complex roofs or ATKIS-derived structures (like bridges) may have varying accuracy or be modeled effectively at LoD1 geometry.
