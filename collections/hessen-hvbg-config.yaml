id: hvbg-hessen
title: 3D Building Models Hessen LoD2
description: |
  Digital 3D building models (LoD2) for the state of Hessen, Germany.
  The dataset is an extension of ALKIS building footprints into the third dimension.
  Heights are calculated by intersecting footprints with 3D geobasis data such as
  Airborne Laser Scanning (ALS) and bDOM. It also optionally includes
  the 'ALKIS-ATKIS-übergreifender Grunddatenbestand', which adds
  topographical structures with 3D relevance like bridges, towers, and wind turbines.
  LoD2 models feature standardized roof shapes with a general height
  accuracy of +/- 1m[cite: 21].
license: proprietary # NOTE: Offered as free self-service download, but exact open data license (e.g., dl-de/by-2-0) is not explicitly named.
keywords:
  - 3d city model
  - germany
  - hessen
  - buildings
  - citygml
  - lod2
