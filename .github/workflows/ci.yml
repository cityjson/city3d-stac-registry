name: Validate Registry

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Validate collection configs
        shell: bash
        run: |
          set -euo pipefail
          for cfg in collections/*.yaml; do
            echo "Validating $cfg"
            cargo run --quiet --manifest-path tools/cityjson-stac/Cargo.toml -- \
              collection --config "$cfg" --dry-run
          done

      - name: Validate catalog config
        run: |
          cargo run --quiet --manifest-path tools/cityjson-stac/Cargo.toml -- \
            catalog --config catalog/catalog-config.yaml --dry-run
